# models.toml — Single source of truth for model metadata.
#
# Embedded in the Rust binary at compile time (include_str!).
# Python validates against this at startup.
#
# To add a new model: add an entry here, then add pipeline config
# in python/modl_worker/adapters/arch_config.py under the same arch_key.
# Run `pytest` from `python/` to verify sync (see python/tests/test_arch_config.py).

# ─── Flux 1 ──────────────────────────────────────────────────────────

[families.flux1]
name = "Flux 1"
vendor = "Black Forest Labs"
year = 2024

[families.flux1.models.flux-dev]
name = "Flux Dev"
arch_key = "flux"
description = "High quality, strong prompt following, 28 steps"
transformer_b = 12.0
text_encoder = "CLIP-L + T5-XXL"
text_encoder_b = 5.0
total_b = 17.0
vram_bf16 = 34
vram_fp8 = 20
capabilities = ["txt2img", "img2img", "inpaint", "lora", "training"]
quality = 4
speed = 2
text_rendering = false
defaults = { steps = 28, guidance = 3.5, resolution = 1024 }

[families.flux1.models.flux-dev.controlnet]
manifest_id = "flux-dev-controlnet-union"
types = ["canny", "depth", "pose", "softedge", "gray"]
default_strength = 0.7
default_end = 0.8
min_steps = 28

[families.flux1.models.flux-dev.style_ref]
mechanism = "ip-adapter"
