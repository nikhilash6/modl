<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>modl — Training Preview</title>
<style>
  :root {
    --bg: #0d1117; --bg2: #161b22; --bg3: #21262d;
    --fg: #e6edf3; --fg2: #8b949e; --accent: #58a6ff;
    --green: #3fb950; --orange: #d29922; --red: #f85149;
    --border: #30363d; --radius: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    background: var(--bg); color: var(--fg); line-height: 1.5; }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }

  /* Layout */
  .header { background: var(--bg2); border-bottom: 1px solid var(--border);
    padding: 12px 24px; display: flex; align-items: center; gap: 16px; position: sticky; top: 0; z-index: 10; }
  .header h1 { font-size: 18px; font-weight: 600; }
  .header h1 span { color: var(--accent); }
  .header nav { display: flex; gap: 4px; }
  .header nav button { background: none; border: 1px solid transparent; color: var(--fg2);
    padding: 6px 14px; border-radius: var(--radius); cursor: pointer; font-size: 14px; }
  .header nav button.active { background: var(--bg3); color: var(--fg); border-color: var(--border); }
  .header nav button:hover { color: var(--fg); }

  .container { margin: 0 auto; padding: 16px 20px; }

  /* Sidebar + Main layout for runs */
  .split { display: flex; gap: 24px; }
  .sidebar { width: 200px; flex-shrink: 0; }
  .sidebar-list { list-style: none; }
  .sidebar-list li { padding: 8px 12px; border-radius: var(--radius); cursor: pointer;
    color: var(--fg2); font-size: 14px; border: 1px solid transparent; margin-bottom: 2px; }
  .sidebar-list li:hover { background: var(--bg2); color: var(--fg); }
  .sidebar-list li.active { background: var(--bg3); color: var(--fg); border-color: var(--border); }
  .main { flex: 1; min-width: 0; }

  /* Cards */
  .card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 20px; margin-bottom: 16px; }
  .card h2 { font-size: 16px; font-weight: 600; margin-bottom: 12px; color: var(--fg); }
  .card h3 { font-size: 14px; font-weight: 600; margin-bottom: 8px; color: var(--fg2); }

  /* Config table */
  .config-grid { display: grid; grid-template-columns: auto 1fr; gap: 4px 16px; font-size: 13px; }
  .config-grid .key { color: var(--fg2); }
  .config-grid .val { color: var(--fg); font-family: "SF Mono", "Fira Code", monospace; }

  /* Sample grid */
  .step-section { margin-bottom: 24px; }
  .step-label { font-size: 13px; font-weight: 600; color: var(--accent); margin-bottom: 8px;
    display: flex; align-items: center; gap: 8px; }
  .step-label .badge { background: var(--bg3); color: var(--fg2); padding: 2px 8px;
    border-radius: 12px; font-size: 11px; font-weight: 400; }

  /* Dataset gallery */
  .dataset-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 12px; }
  .dataset-card { background: var(--bg3); border-radius: var(--radius); overflow: hidden;
    border: 1px solid var(--border); }
  .dataset-card img { width: 100%; aspect-ratio: 1; object-fit: cover; display: block; }
  .dataset-card .caption-text { padding: 8px 12px; font-size: 12px; color: var(--fg2);
    max-height: 80px; overflow-y: auto; line-height: 1.4; }
  .dataset-card .fname { padding: 4px 12px 8px; font-size: 11px; color: var(--fg2); opacity: 0.6;
    font-family: monospace; }

  /* Stats bar */
  .stats { display: flex; gap: 24px; margin-bottom: 16px; flex-wrap: wrap; }
  .stat { text-align: center; }
  .stat .num { font-size: 28px; font-weight: 700; color: var(--accent); }
  .stat .label { font-size: 12px; color: var(--fg2); }

  /* Lightbox */
  .lightbox { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 100;
    display: none; align-items: center; justify-content: center; cursor: zoom-out; }
  .lightbox.open { display: flex; }
  .lightbox img { max-width: 95vw; max-height: 95vh; border-radius: 8px; }

  /* Loading */
  .loading { color: var(--fg2); padding: 40px; text-align: center; }

  /* Pagination */
  .pagination { display: flex; gap: 8px; align-items: center; justify-content: center; margin-top: 16px; }
  .pagination button { background: var(--bg3); color: var(--fg); border: 1px solid var(--border);
    padding: 6px 14px; border-radius: var(--radius); cursor: pointer; font-size: 13px; }
  .pagination button:disabled { opacity: 0.4; cursor: default; }
  .pagination span { color: var(--fg2); font-size: 13px; }

  /* Live training status banner */
  .status-banner { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 16px 20px; margin-bottom: 20px; }
  .status-banner.is-running { border-color: var(--green); border-left: 3px solid var(--green); }
  .status-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--fg2); flex-shrink: 0; }
  .status-dot.active { background: var(--green); animation: pulse 2s infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
  .status-name { font-weight: 600; font-size: 15px; }
  .status-arch { color: var(--fg2); font-size: 13px; }
  .status-progress-bar { background: var(--bg3); border-radius: 4px; height: 8px; overflow: hidden;
    margin-bottom: 8px; }
  .status-progress-fill { height: 100%; background: var(--accent); border-radius: 4px;
    transition: width 1s ease-out; }
  .status-meta span { transition: opacity 0.2s; }
  .status-progress-fill.running { background: var(--green); }
  .status-meta { display: flex; gap: 20px; flex-wrap: wrap; font-size: 13px; color: var(--fg2);
    font-variant-numeric: tabular-nums; }
  .status-meta span { white-space: nowrap; }
  .status-meta .val { color: var(--fg); font-weight: 500;
    font-variant-numeric: tabular-nums; display: inline-block; }
  .status-meta .loss { color: var(--orange); font-family: "SF Mono", "Fira Code", monospace; }

  /* Config summary + details */
  .config-summary { display: flex; gap: 16px; flex-wrap: wrap; font-size: 13px; align-items: center; }
  .config-summary .chip { background: var(--bg3); color: var(--fg); padding: 3px 10px;
    border-radius: 12px; font-family: "SF Mono", "Fira Code", monospace; font-size: 12px; }
  .config-more { color: var(--accent); font-size: 12px; cursor: pointer; margin-left: auto;
    background: none; border: none; padding: 3px 0; }
  .config-more:hover { text-decoration: underline; }
  .config-details { overflow: hidden; transition: max-height 0.3s ease, opacity 0.2s ease;
    max-height: 0; opacity: 0; margin-top: 0; }
  .config-details.open { max-height: 2000px; opacity: 1; margin-top: 12px; }

  /* Evolution grid — CSS grid for perfect column alignment */
  .evo-table-wrap { overflow-x: auto; }
  .evo-prompt { font-size: 12px; color: var(--fg2); padding: 8px 0 4px; }
  .evo-prompt:first-child { padding-top: 0; }
  .evo-grid { display: grid; gap: 4px; }
  .evo-grid .evo-hdr { font-size: 11px; font-weight: 600; color: var(--accent); text-align: left;
    padding-bottom: 4px; white-space: nowrap; }
  .evo-grid img { width: 100%; display: block; border-radius: 4px; cursor: pointer;
    transition: opacity 0.15s; border: 1px solid var(--border); }
  .evo-grid img:hover { opacity: 0.85; border-color: var(--accent); }

  /* Lineage card */
  .lineage-section { display: flex; gap: 24px; flex-wrap: wrap; align-items: flex-start; }
  .lineage-block { flex: 1; min-width: 180px; }
  .lineage-block h3 { font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px;
    color: var(--fg2); margin-bottom: 8px; font-weight: 600; }
  .lineage-dataset { display: flex; align-items: center; gap: 10px; }
  .lineage-dataset .ds-icon { width: 36px; height: 36px; border-radius: 6px; background: var(--bg3);
    display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
  .lineage-dataset .ds-info { font-size: 13px; }
  .lineage-dataset .ds-name { font-weight: 600; color: var(--accent); cursor: pointer; }
  .lineage-dataset .ds-name:hover { text-decoration: underline; }
  .lineage-dataset .ds-count { color: var(--fg2); font-size: 12px; }
  .lineage-jobs { font-size: 12px; }
  .lineage-jobs table { border-collapse: collapse; width: 100%; }
  .lineage-jobs th { text-align: left; color: var(--fg2); font-weight: 500; padding: 4px 8px 4px 0;
    border-bottom: 1px solid var(--border); }
  .lineage-jobs td { padding: 4px 8px 4px 0; color: var(--fg); font-family: "SF Mono", "Fira Code", monospace;
    font-size: 11px; }
  .lineage-jobs .status-chip { display: inline-block; padding: 1px 8px; border-radius: 10px;
    font-size: 11px; font-weight: 500; }
  .lineage-jobs .status-chip.completed { background: rgba(63,185,80,0.15); color: var(--green); }
  .lineage-jobs .status-chip.running { background: rgba(88,166,255,0.15); color: var(--accent); }
  .lineage-jobs .status-chip.error { background: rgba(248,81,73,0.15); color: var(--red); }
  .lineage-jobs .resume-tag { color: var(--fg2); font-size: 10px; }

  /* Empty state */
  .empty { text-align: center; padding: 60px 20px; color: var(--fg2); }
  .empty h2 { font-size: 20px; margin-bottom: 8px; color: var(--fg); }
</style>
</head>
<body>

<div class="header">
  <h1><span>modl</span> preview</h1>
  <nav>
    <button id="tab-runs" class="active" onclick="switchTab('runs')">Training Runs</button>
    <button id="tab-datasets" onclick="switchTab('datasets')">Datasets</button>
  </nav>
</div>

<div class="container">
  <div id="status-banners"></div>
  <div id="view-runs">
    <div class="split">
      <div class="sidebar">
        <ul class="sidebar-list" id="runs-list">
          <li class="loading">Loading...</li>
        </ul>
      </div>
      <div class="main" id="run-detail">
        <div class="empty">
          <h2>Select a training run</h2>
          <p>Pick a run from the left to view samples and config.</p>
        </div>
      </div>
    </div>
  </div>

  <div id="view-datasets" style="display:none">
    <div class="split">
      <div class="sidebar">
        <ul class="sidebar-list" id="datasets-list">
          <li class="loading">Loading...</li>
        </ul>
      </div>
      <div class="main" id="dataset-detail">
        <div class="empty">
          <h2>Select a dataset</h2>
          <p>Pick a dataset from the left to view images and captions.</p>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <img id="lightbox-img" src="" alt="">
</div>

<script>
// State
let currentTab = 'runs';
let currentRun = null;
let currentDataset = null;
let datasetPage = 0;
const PAGE_SIZE = 50;

// Tab switching
function switchTab(tab) {
  currentTab = tab;
  document.getElementById('tab-runs').classList.toggle('active', tab === 'runs');
  document.getElementById('tab-datasets').classList.toggle('active', tab === 'datasets');
  document.getElementById('view-runs').style.display = tab === 'runs' ? '' : 'none';
  document.getElementById('view-datasets').style.display = tab === 'datasets' ? '' : 'none';
  if (tab === 'datasets' && !document.getElementById('datasets-list').dataset.loaded) {
    loadDatasets();
  }
}

// Lightbox
function openLightbox(src) {
  document.getElementById('lightbox-img').src = src;
  document.getElementById('lightbox').classList.add('open');
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });

// ---- Live Training Status ----
async function loadStatus() {
  try {
    const res = await fetch('/api/status');
    const runs = await res.json();
    const container = document.getElementById('status-banners');
    const active = runs.filter(r => r.is_running);

    if (active.length === 0) {
      container.innerHTML = '';
      return;
    }

    // Surgical update: only touch values that actually changed
    for (const r of active) {
      const existing = document.getElementById('status-' + r.name);
      if (existing) {
        // Only update bar if we have a real percent (skip null/0 if bar already has progress)
        if (r.percent != null && r.percent > 0) {
          const fill = existing.querySelector('.status-progress-fill');
          if (fill) fill.style.width = r.percent.toFixed(1) + '%';
        }
        // Only update meta if values changed (avoid DOM thrash)
        const metaEl = existing.querySelector('.status-meta');
        if (metaEl) {
          const newMeta = buildStatusMeta(r);
          if (metaEl.innerHTML !== newMeta) metaEl.innerHTML = newMeta;
        }
      } else {
        // New run appeared, full re-render
        container.innerHTML = active.map(r2 => renderStatusBanner(r2)).join('');
        return;
      }
    }
  } catch (e) {
    // silently fail
  }
}

function buildStatusMeta(r) {
  const step = r.current_step || 0;
  const total = r.total_steps || 0;
  const totalStr = total.toLocaleString();
  const stepStr = step.toLocaleString().padStart(totalStr.length, '\u2007');
  const dash = '\u2014';
  return `<span><span class="val">${stepStr}</span> / ${totalStr} steps</span>`
    + `<span><span class="val">${r.speed != null ? r.speed.toFixed(2) : dash}</span> it/s</span>`
    + `<span>elapsed <span class="val">${r.elapsed || dash}</span></span>`
    + `<span>eta <span class="val">${r.eta || dash}</span></span>`
    + `<span>loss <span class="val loss">${r.loss != null ? r.loss.toFixed(4) : dash}</span></span>`
    + `<span>lr <span class="val">${r.lr || dash}</span></span>`;
}

function renderStatusBanner(r) {
  const pct = r.percent != null ? r.percent.toFixed(1) : 0;
  const archLabel = [r.arch, r.trigger_word].filter(Boolean).join(' · ');

  return `<div class="status-banner is-running" id="status-${escapeHtml(r.name)}">
    <div class="status-header">
      <div class="status-dot active"></div>
      <span class="status-name">${escapeHtml(r.name)}</span>
      ${archLabel ? `<span class="status-arch">${escapeHtml(archLabel)}</span>` : ''}
    </div>
    <div class="status-progress-bar">
      <div class="status-progress-fill running" style="width: ${pct}%"></div>
    </div>
    <div class="status-meta">${buildStatusMeta(r)}</div>
  </div>`;
}

// ---- Training Runs ----
async function loadRuns() {
  try {
    const res = await fetch('/api/runs');
    const runs = await res.json();
    const list = document.getElementById('runs-list');

    if (runs.length === 0) {
      list.innerHTML = '<li class="loading">No training runs found</li>';
      return;
    }

    list.innerHTML = runs.map(name =>
      `<li onclick="selectRun('${name}')" id="run-${name}">${name}</li>`
    ).join('');

    // Auto-select last run
    selectRun(runs[runs.length - 1]);
  } catch (e) {
    document.getElementById('runs-list').innerHTML = '<li class="loading">Failed to load — retrying...</li>';
    setTimeout(loadRuns, 2000);
  }
}

async function selectRun(name) {
  currentRun = name;
  document.querySelectorAll('#runs-list li').forEach(li => li.classList.remove('active'));
  const el = document.getElementById('run-' + name);
  if (el) el.classList.add('active');

  const detail = document.getElementById('run-detail');
  detail.innerHTML = '<div class="loading">Loading...</div>';

  const res = await fetch(`/api/runs/${name}`);
  const run = await res.json();

  let html = '';

  // Stats
  const totalSamples = run.samples.reduce((a, g) => a + g.images.length, 0);
  const maxStep = run.samples.length > 0 ? run.samples[run.samples.length - 1].step : 0;
  html += `<div class="stats">
    <div class="stat"><div class="num">${run.samples.length}</div><div class="label">Step Checkpoints</div></div>
    <div class="stat"><div class="num">${totalSamples}</div><div class="label">Sample Images</div></div>
    <div class="stat"><div class="num">${maxStep.toLocaleString()}</div><div class="label">Latest Step</div></div>
    <div class="stat"><div class="num">${run.lora_size ? formatBytes(run.lora_size) : '—'}</div><div class="label">LoRA Size</div></div>
  </div>`;

  // Lineage card — dataset + job history from DB
  if (run.lineage) {
    const lin = run.lineage;
    html += `<div class="card"><h2>Lineage</h2><div class="lineage-section">`;

    // Dataset block
    if (lin.dataset_name) {
      html += `<div class="lineage-block">
        <h3>Dataset</h3>
        <div class="lineage-dataset">
          <div class="ds-icon">📁</div>
          <div class="ds-info">
            <div class="ds-name" onclick="switchTab('datasets'); setTimeout(() => selectDataset('${escapeHtml(lin.dataset_name)}'), 100)">${escapeHtml(lin.dataset_name)}</div>
            ${lin.dataset_image_count ? `<div class="ds-count">${lin.dataset_image_count} images</div>` : ''}
          </div>
        </div>
      </div>`;
    }

    // Job history block
    if (lin.jobs && lin.jobs.length > 0) {
      html += `<div class="lineage-block" style="flex:2">
        <h3>Training History</h3>
        <div class="lineage-jobs"><table>
          <tr><th>Job</th><th>Status</th><th>Steps</th><th>Date</th><th></th></tr>`;
      for (const j of lin.jobs) {
        const shortId = j.job_id.replace(/^job-/, '');
        const statusCls = j.status === 'completed' ? 'completed' : j.status === 'running' ? 'running' : 'error';
        html += `<tr>
          <td>${escapeHtml(shortId)}</td>
          <td><span class="status-chip ${statusCls}">${j.status}</span></td>
          <td>${j.steps ? j.steps.toLocaleString() : '—'}</td>
          <td>${j.created_at?.substring(0, 16) || '—'}</td>
          <td>${j.resumed_from ? `<span class="resume-tag">↩ ${escapeHtml(j.resumed_from)}</span>` : ''}</td>
        </tr>`;
      }
      html += '</table></div></div>';
    }

    html += '</div></div>';
  }

  // Config (compact summary + show more)
  if (run.config) {
    const cfg = run.config?.config?.process?.[0];
    if (cfg) {
      // Summary chips
      const chips = [
        cfg.model?.arch?.toUpperCase(),
        cfg.model?.name_or_path?.split('/')?.pop(),
        cfg.network?.linear ? `rank ${cfg.network.linear}` : null,
        cfg.train?.steps ? `${cfg.train.steps.toLocaleString()} steps` : null,
        cfg.train?.lr ? `lr ${cfg.train.lr}` : null,
        cfg.train?.optimizer,
        cfg.trigger_word ? `"${cfg.trigger_word}"` : null,
      ].filter(Boolean);

      html += `<div class="card"><h2>Config</h2>
        <div class="config-summary">
          ${chips.map(c => `<span class="chip">${c}</span>`).join('')}
          <button class="config-more" onclick="toggleConfigDetails(this)">show more</button>
        </div>
        <div class="config-details"><div class="config-grid">`;

      const params = [
        ['Base Model', cfg.model?.name_or_path],
        ['Architecture', cfg.model?.arch],
        ['Trigger Word', cfg.trigger_word],
        ['Steps', cfg.train?.steps],
        ['Learning Rate', cfg.train?.lr],
        ['Batch Size', cfg.train?.batch_size],
        ['Optimizer', cfg.train?.optimizer],
        ['LoRA Rank', cfg.network?.linear],
        ['Alpha', cfg.network?.linear_alpha],
        ['Resolution', cfg.datasets?.[0]?.resolution?.join?.('×') || cfg.datasets?.[0]?.resolution],
        ['Caption Dropout', cfg.datasets?.[0]?.caption_dropout_rate],
        ['Num Repeats', cfg.datasets?.[0]?.num_repeats],
        ['Content/Style', cfg.train?.content_or_style],
        ['Gradient Checkpointing', cfg.train?.gradient_checkpointing],
        ['Train UNet', cfg.train?.train_unet],
        ['Train Text Encoder', cfg.train?.train_text_encoder],
        ['EMA', cfg.train?.ema_config?.use_ema],
        ['Noise Offset', cfg.train?.noise_offset],
        ['Sample Every', cfg.sample?.sample_every],
        ['Save Every', cfg.save?.save_every],
      ];
      for (const [k, v] of params) {
        if (v !== undefined && v !== null) {
          html += `<div class="key">${k}</div><div class="val">${v}</div>`;
        }
      }
      html += '</div></div></div>';
    }
  }

  // Sample prompts from config for row labels
  const samplePrompts = run.config?.config?.process?.[0]?.sample?.prompts || [];

  // Evolution grid: prompt label as row above images, left-aligned
  if (run.samples.length > 0) {
    // Derive prompt count from the mode (most common image count) across steps,
    // rather than from step 0 which may have duplicates from resumed runs.
    const imgCounts = run.samples.map(s => s.images.length).filter(n => n > 0);
    const promptCount = imgCounts.length > 0
      ? imgCounts.sort((a,b) => imgCounts.filter(v => v===a).length - imgCounts.filter(v => v===b).length).pop()
      : 0;

    html += '<div class="card"><h2>Sample Evolution</h2>';
    if (promptCount === 0) {
      html += '<p style="color:var(--fg2)">No sample images generated yet.</p>';
    } else {
      const stepCount = run.samples.length;
      html += `<div class="evo-table-wrap">`;
      // Use CSS grid with one column per step for perfect alignment
      html += `<div class="evo-grid" style="grid-template-columns: repeat(${stepCount}, minmax(100px, 1fr));">`;
      // Step number headers (first row of the grid)
      for (const group of run.samples) {
        html += `<div class="evo-hdr">Step ${group.step.toLocaleString()}</div>`;
      }
      // One grid-row per prompt
      for (let i = 0; i < promptCount; i++) {
        const promptText = samplePrompts[i] || `Prompt ${i + 1}`;
        // Prompt label spans all columns
        html += `<div class="evo-prompt" style="grid-column: 1 / -1">${escapeHtml(promptText)}</div>`;
        for (const group of run.samples) {
          const img = group.images[i];
          if (img) {
            html += `<img src="/files/${img}" loading="lazy" onclick="openLightbox('/files/${img}')" title="Step ${group.step.toLocaleString()}">`;
          } else {
            html += `<div></div>`;
          }
        }
      }
      html += '</div>';
      html += '</div>';
    }
    html += '</div>';
  }

  detail.innerHTML = html;
  lastSampleCount = run.samples.length;
}

function toggleConfigDetails(btn) {
  const details = btn.closest('.card').querySelector('.config-details');
  if (details.classList.contains('open')) {
    details.classList.remove('open');
    btn.textContent = 'show more';
  } else {
    details.classList.add('open');
    btn.textContent = 'hide';
  }
}

// ---- Datasets ----
async function loadDatasets() {
  const res = await fetch('/api/datasets');
  const datasets = await res.json();
  const list = document.getElementById('datasets-list');
  list.dataset.loaded = 'true';

  if (datasets.length === 0) {
    list.innerHTML = '<li class="loading">No datasets found</li>';
    return;
  }

  list.innerHTML = datasets.map(name =>
    `<li onclick="selectDataset('${name}')" id="ds-${name}">${name}</li>`
  ).join('');

  // Auto-select first
  selectDataset(datasets[0]);
}

async function selectDataset(name, page) {
  currentDataset = name;
  datasetPage = page || 0;
  document.querySelectorAll('#datasets-list li').forEach(li => li.classList.remove('active'));
  const el = document.getElementById('ds-' + name);
  if (el) el.classList.add('active');

  const detail = document.getElementById('dataset-detail');
  detail.innerHTML = '<div class="loading">Loading...</div>';

  const offset = datasetPage * PAGE_SIZE;
  const res = await fetch(`/api/datasets/${name}?limit=${PAGE_SIZE}&offset=${offset}`);
  const ds = await res.json();

  let html = '';

  // Stats
  html += `<div class="stats">
    <div class="stat"><div class="num">${ds.image_count}</div><div class="label">Images</div></div>
    <div class="stat"><div class="num">${ds.captioned_count}</div><div class="label">Captioned</div></div>
    <div class="stat"><div class="num">${(ds.coverage * 100).toFixed(0)}%</div><div class="label">Coverage</div></div>
  </div>`;

  // Gallery
  html += '<div class="dataset-grid">';
  for (const img of ds.images) {
    html += `<div class="dataset-card">
      <img src="/files/${img.image_url}" loading="lazy" onclick="openLightbox('/files/${img.image_url}')">
      ${img.caption ? `<div class="caption-text">${escapeHtml(img.caption)}</div>` : ''}
      <div class="fname">${escapeHtml(img.filename)}</div>
    </div>`;
  }
  html += '</div>';

  // Pagination
  const totalPages = Math.ceil(ds.image_count / PAGE_SIZE);
  if (totalPages > 1) {
    html += `<div class="pagination">
      <button ${datasetPage === 0 ? 'disabled' : ''} onclick="selectDataset('${name}', ${datasetPage - 1})">← Prev</button>
      <span>Page ${datasetPage + 1} / ${totalPages}</span>
      <button ${datasetPage >= totalPages - 1 ? 'disabled' : ''} onclick="selectDataset('${name}', ${datasetPage + 1})">Next →</button>
    </div>`;
  }

  detail.innerHTML = html;
}

// Helpers
function formatBytes(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
  if (bytes < 1073741824) return (bytes / 1048576).toFixed(1) + ' MB';
  return (bytes / 1073741824).toFixed(2) + ' GB';
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// Auto-refresh: poll status every 1s, re-check run samples every 15s
let statusInterval = null;
let samplesInterval = null;
let lastSampleCount = 0;

function startAutoRefresh() {
  // Status banner: realtime (local, surgical DOM update)
  statusInterval = setInterval(loadStatus, 1000);

  // Samples: less frequent, only re-render if new sample steps appeared
  samplesInterval = setInterval(async () => {
    if (currentTab === 'runs' && currentRun) {
      try {
        const res = await fetch(`/api/runs/${currentRun}`);
        if (res.ok) {
          const run = await res.json();
          if (run.samples.length > lastSampleCount) {
            selectRun(currentRun);
          }
        }
      } catch (e) { /* ignore */ }
    }
  }, 15000);
}

// Init
loadRuns();
loadStatus();
startAutoRefresh();
</script>
